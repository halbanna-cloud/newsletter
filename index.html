<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نشرات مادتوميتو</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --red:#D9191A;
  --dark:#0F0F0F;
  --white:#fff;
  --muted:#6B6B6B;
  --border:#E5E3DF;
  --bg:#F2F1EE;
}

body{
  font-family:'IBM Plex Sans Arabic',Arial,sans-serif;
  background:var(--bg);
  color:var(--dark);
  min-height:100vh;
}

/* ── HEADER ── */
header{
  background:var(--dark);
  padding:0 48px;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:3px solid var(--red);
}

.brand{display:flex;align-items:center;gap:16px;}
.brand-name{font-size:14px;font-weight:700;color:white;letter-spacing:0.05em;}
.brand-sub{font-size:11px;color:rgba(255,255,255,0.35);}

.header-actions{display:flex;gap:10px;}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;
  border:none;font-family:inherit;transition:all 0.2s;
}
.btn-ghost{background:rgba(255,255,255,0.08);color:white;}
.btn-ghost:hover{background:rgba(255,255,255,0.15);}
.btn-red{background:var(--red);color:white;}
.btn-red:hover{background:#bf1515;}

/* ── MAIN ── */
main{max-width:1100px;margin:0 auto;padding:56px 24px;}

.page-title{
  font-size:32px;font-weight:700;letter-spacing:-0.02em;
  margin-bottom:6px;
}
.page-sub{font-size:14px;color:var(--muted);margin-bottom:40px;}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
}

/* ── CARD ── */
.card{
  background:white;
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--border);
  transition:transform 0.25s ease,box-shadow 0.25s ease;
  cursor:pointer;
  text-decoration:none;
  color:inherit;
  display:flex;
  flex-direction:column;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(0,0,0,0.1);
}

.card-thumb{
  height:200px;
  overflow:hidden;
  position:relative;
  background:var(--dark);
}
.card-thumb img{
  width:100%;height:100%;object-fit:cover;
  opacity:0.7;
  transition:opacity 0.3s,transform 0.5s;
}
.card:hover .card-thumb img{opacity:0.9;transform:scale(1.04);}

.card-issue{
  position:absolute;top:16px;right:16px;
  background:var(--red);color:white;
  font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:20px;
  letter-spacing:0.08em;
}

.card-body{padding:24px;flex:1;display:flex;flex-direction:column;}
.card-date{font-size:11px;color:var(--muted);margin-bottom:8px;direction:ltr;text-align:right;}
.card-title{font-size:18px;font-weight:700;line-height:1.3;letter-spacing:-0.01em;margin-bottom:8px;}
.card-desc{font-size:13px;color:var(--muted);line-height:1.65;flex:1;}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:20px;padding-top:16px;
  border-top:1px solid var(--border);
}
.card-sections{font-size:11px;color:var(--muted);}
.card-arrow{
  width:32px;height:32px;border-radius:8px;
  background:var(--dark);color:white;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;transition:background 0.2s;
}
.card:hover .card-arrow{background:var(--red);}

/* ── NEW CARD ── */
.card-new{
  border:2px dashed var(--border);
  background:transparent;
  align-items:center;
  justify-content:center;
  min-height:320px;
  gap:16px;
  padding:40px;
  text-align:center;
}
.card-new:hover{
  border-color:var(--red);
  background:rgba(217,25,26,0.03);
}
.new-icon{
  width:56px;height:56px;border-radius:16px;
  background:var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  transition:background 0.2s;
}
.card-new:hover .new-icon{background:var(--red);color:white;}
.new-title{font-size:15px;font-weight:600;color:var(--dark);}
.new-sub{font-size:12px;color:var(--muted);}

/* ── EMPTY ── */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:80px 40px;
  color:var(--muted);
}
.empty-icon{font-size:48px;margin-bottom:16px;}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px;}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:white;border-radius:20px;
  padding:40px;width:480px;max-width:calc(100vw - 48px);
  transform:translateY(20px);transition:transform 0.2s;
}
.modal-overlay.open .modal{transform:none;}
.modal-title{font-size:20px;font-weight:700;margin-bottom:24px;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;}
.form-input{
  width:100%;padding:10px 14px;
  border:1px solid var(--border);border-radius:8px;
  font-size:14px;font-family:inherit;
  outline:none;transition:border-color 0.2s;
}
.form-input:focus{border-color:var(--dark);}
.modal-actions{display:flex;gap:10px;margin-top:24px;justify-content:flex-end;}
.btn-outline{background:white;color:var(--dark);border:1px solid var(--border);}
.btn-outline:hover{background:var(--bg);}

/* ── SETTINGS PANEL ── */
.settings-bar{
  background:white;border-bottom:1px solid var(--border);
  padding:12px 48px;
  display:flex;align-items:center;gap:16px;
  font-size:12px;color:var(--muted);
}
.settings-bar a{color:var(--red);text-decoration:none;font-weight:600;}

@media(max-width:600px){
  header{padding:0 20px;}
  main{padding:32px 16px;}
  .settings-bar{padding:12px 20px;}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div>
      <div class="brand-name">MAD TOMATO GROUP</div>
      <div class="brand-sub">منصة النشرات الإعلامية</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openSettings()">⚙️ الإعدادات</button>
    <button class="btn btn-red" onclick="openNewModal()">+ نشرة جديدة</button>
  </div>
</header>

<div class="settings-bar" id="settingsBar" style="display:none;">
  ⚠️ لم يتم ضبط GitHub بعد —
  <a href="#" onclick="openSettings()">اضبط الإعدادات الآن</a>
  لتفعيل النشر التلقائي
</div>

<main>
  <div class="page-title">النشرات</div>
  <div class="page-sub">كل نشرات مجموعة مادتوميتو في مكان واحد</div>

  <div class="grid" id="grid">
    <!-- تتبنى بالـ JS -->
  </div>
</main>

<!-- Modal إضافة نشرة -->
<div class="modal-overlay" id="newModal">
  <div class="modal">
    <div class="modal-title">إنشاء نشرة جديدة</div>
    <div class="form-group">
      <label class="form-label">الشهر</label>
      <input class="form-input" id="newMonth" placeholder="مثال: مارس" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">السنة</label>
      <input class="form-input" id="newYear" placeholder="2026" type="text" value="2026">
    </div>
    <div class="form-group">
      <label class="form-label">عنوان العدد</label>
      <input class="form-input" id="newTheme" placeholder="مثال: نواصل الإنجاز" type="text">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeNewModal()">إلغاء</button>
      <button class="btn btn-red" onclick="createNewsletter()">إنشاء وتعديل</button>
    </div>
  </div>
</div>

<!-- Modal الإعدادات -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-title">⚙️ إعدادات GitHub</div>
    <div class="form-group">
      <label class="form-label">GitHub Repository</label>
      <input class="form-input" id="cfgRepo" placeholder="madtomatogroup/newsletter" type="text">
    </div>
    <div class="form-group">
      <label class="form-label">GitHub Branch</label>
      <input class="form-input" id="cfgBranch" placeholder="main" type="text" value="main">
    </div>
    <div class="form-group">
      <label class="form-label">Personal Access Token
        <span style="color:var(--muted);font-weight:400;"> — <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--red);">احصل عليه من هنا</a></span>
      </label>
      <input class="form-input" id="cfgToken" placeholder="ghp_xxxxxxxxxxxx" type="password">
    </div>
    <div style="background:#F7F7F5;border-radius:8px;padding:12px 16px;font-size:12px;color:var(--muted);margin-bottom:4px;">
      🔒 الـ token يُحفظ في متصفحك فقط — لا يُرسل لأي خادم خارجي
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSettings()">إلغاء</button>
      <button class="btn btn-red" onclick="saveSettings()">حفظ</button>
    </div>
  </div>
</div>

<script>
// ── STORAGE ──────────────────────────────────────────────────────
const CFG_KEY = 'mt_newsletter_config';
const NL_KEY  = 'mt_newsletters';

function getCfg(){
  try{ return JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); }
  catch{ return {}; }
}

function getNewsletters(){
  try{
    const saved = JSON.parse(localStorage.getItem(NL_KEY)||'[]');
    // Always include feb 2026 if exists
    return saved;
  } catch{ return []; }
}

function saveNewsletters(list){
  localStorage.setItem(NL_KEY, JSON.stringify(list));
}

// ── RENDER ───────────────────────────────────────────────────────
function render(){
  const cfg = getCfg();
  const newsletters = getNewsletters();
  const grid = document.getElementById('grid');

  // Settings bar
  document.getElementById('settingsBar').style.display =
    (!cfg.repo || !cfg.token) ? 'flex' : 'none';

  let html = '';

  if(newsletters.length === 0){
    html = `<div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-title">لا توجد نشرات بعد</div>
      <div>اضغط "نشرة جديدة" لإنشاء أول نشرة</div>
    </div>`;
  } else {
    newsletters.forEach(nl => {
      html += `
        <a class="card" href="editor.html?id=${nl.id}">
          <div class="card-thumb">
            ${nl.thumb ? `<img src="${nl.thumb}" alt="">` : '<div style="width:100%;height:100%;background:linear-gradient(135deg,#0F0F0F,#2a2a2a)"></div>'}
            <div class="card-issue">${nl.issue}</div>
          </div>
          <div class="card-body">
            <div class="card-date">${nl.createdAt || ''}</div>
            <div class="card-title">${nl.theme}</div>
            <div class="card-desc">${nl.desc || 'نشرة شهرية — مجموعة مادتوميتو الإعلامية'}</div>
            <div class="card-footer">
              <span class="card-sections">${nl.sections || 7} أقسام</span>
              <div class="card-arrow">←</div>
            </div>
          </div>
        </a>`;
    });
  }

  // Add new card
  html += `
    <div class="card card-new" onclick="openNewModal()">
      <div class="new-icon">+</div>
      <div class="new-title">نشرة جديدة</div>
      <div class="new-sub">إنشاء عدد جديد من القالب</div>
    </div>`;

  grid.innerHTML = html;
}

// ── NEW NEWSLETTER ────────────────────────────────────────────────
function openNewModal(){ document.getElementById('newModal').classList.add('open'); }
function closeNewModal(){ document.getElementById('newModal').classList.remove('open'); }

function createNewsletter(){
  const month = document.getElementById('newMonth').value.trim();
  const year  = document.getElementById('newYear').value.trim();
  const theme = document.getElementById('newTheme').value.trim();

  if(!month || !theme){ alert('يرجى ملء الشهر والعنوان'); return; }

  const id = `${month.toLowerCase().replace(/\s/g,'-')}-${year}`;
  const issue = `${month} ${year}`;

  const nl = {
    id,
    issue,
    theme,
    month,
    year,
    sections: 7,
    createdAt: new Date().toLocaleDateString('ar-SA'),
    published: false,
  };

  const list = getNewsletters();
  if(list.find(n => n.id === id)){
    alert('هذه النشرة موجودة بالفعل');
    return;
  }
  list.unshift(nl);
  saveNewsletters(list);
  closeNewModal();

  // Go to editor
  window.location.href = `editor.html?id=${id}&new=1`;
}

// ── SETTINGS ─────────────────────────────────────────────────────
function openSettings(){
  const cfg = getCfg();
  document.getElementById('cfgRepo').value   = cfg.repo   || 'madtomatogroup/newsletter';
  document.getElementById('cfgBranch').value = cfg.branch || 'main';
  document.getElementById('cfgToken').value  = cfg.token  || '';
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings(){ document.getElementById('settingsModal').classList.remove('open'); }

function saveSettings(){
  const cfg = {
    repo:   document.getElementById('cfgRepo').value.trim(),
    branch: document.getElementById('cfgBranch').value.trim() || 'main',
    token:  document.getElementById('cfgToken').value.trim(),
  };
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
  closeSettings();
  render();
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target === o) o.classList.remove('open'); });
});

// ── INIT ─────────────────────────────────────────────────────────
// Add feb 2026 if not exists
const existing = getNewsletters();
if(!existing.find(n => n.id === 'feb-2026')){
  existing.push({
    id: 'feb-2026',
    issue: 'فبراير 2026',
    theme: 'غينس مرة ثانية.. وبدون عمولة!',
    month: 'فبراير',
    year: '2026',
    sections: 7,
    createdAt: '١٤ مارس ٢٠٢٦',
    published: true,
  });
  saveNewsletters(existing);
}

render();
</script>
</body>
</html>
